<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Selector</title>
<style>
    body {
        margin: 0;
        background: #111;
        color: white;
        font-family: Arial;
        text-align: center;
    }
    #controls {
        margin-top: 40px;
    }
    video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: none;
    }
    select, button {
        padding: 10px;
        margin: 8px;
        font-size: 16px;
    }
</style>
</head>
<body>

<div id="controls">
    <button onclick="detectCameras()">Detect Cameras</button>
    <br>
    <select id="cameraList"></select>
    <br>
    <button onclick="startCamera()">Start Camera</button>
</div>

<video id="video" autoplay playsinline></video>

<script>
let currentStream = null;

async function detectCameras() {
    try {
        // 🔴 Step 1: request permission ONLY to unlock device labels
        const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });

        // 🔴 Step 2: HARD STOP everything immediately
        tempStream.getTracks().forEach(t => {
            t.stop();
            tempStream.removeTrack?.(t);
        });

        // extra safety: clear reference
        await new Promise(r => setTimeout(r, 100));

        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === "videoinput");

        const select = document.getElementById("cameraList");
        select.innerHTML = "";

        cameras.forEach((cam, i) => {
            const opt = document.createElement("option");
            opt.value = cam.deviceId;
            opt.text = cam.label || `Camera ${i + 1}`;
            select.appendChild(opt);
        });

        if (cameras.length === 1) {
            select.selectedIndex = 0;
        }

    } catch (err) {
        alert("Camera permission failed: " + err.message);
    }
}

async function startCamera() {
    const deviceId = document.getElementById("cameraList").value;
    const video = document.getElementById("video");

    if (!deviceId) return alert("Select a camera first");

    try {
        // 🔴 FULL STOP previous stream
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }

        // 🔴 Reset video completely (important)
        video.pause();
        video.srcObject = null;
        video.load?.();

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId } }
        });

        currentStream = stream;
        video.srcObject = stream;

        document.getElementById("controls").style.display = "none";
        video.style.display = "block";

    } catch (err) {
        alert("Start camera failed: " + err.message);
    }
}
</script>

</body>
</html>
