<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Detector</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        margin: 0;
    }
    #controls {
        margin-top: 50px;
    }
    video {
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        display: none;
    }
    select, button {
        padding: 10px;
        margin: 10px;
        font-size: 16px;
    }
</style>
</head>
<body>

<div id="controls">
    <button onclick="detectCameras()">Detect Camera</button>
    <br>
    <select id="cameraList" onchange="startCamera()"></select>
</div>

<video id="video" autoplay playsinline></video>

<script>
let devices = [];

async function detectCameras() {
    try {
        // Ask permission first
        await navigator.mediaDevices.getUserMedia({ video: true });

        const allDevices = await navigator.mediaDevices.enumerateDevices();
        devices = allDevices.filter(d => d.kind === "videoinput");

        const select = document.getElementById("cameraList");
        select.innerHTML = "";

        devices.forEach((device, i) => {
            const option = document.createElement("option");
            option.value = device.deviceId;
            option.text = device.label || `Camera ${i+1}`;
            select.appendChild(option);
        });

        if (devices.length === 1) {
            startCamera();
        }

    } catch (err) {
        alert("Camera permission denied or error: " + err.message);
    }
}

async function startCamera() {
    const select = document.getElementById("cameraList");
    const deviceId = select.value;

    if (!deviceId) return;

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: deviceId } }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

    // Hide controls, show video fullscreen
    document.getElementById("controls").style.display = "none";
    video.style.display = "block";
}
</script>

</body>
</html>
