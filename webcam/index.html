<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Selector</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    #controls {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        background: rgba(0,0,0,0.6);
        padding: 15px;
        border-radius: 10px;
    }

    select, button {
        padding: 10px;
        margin: 5px;
        font-size: 16px;
    }

    /* Background canvas */
    #bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
    }

    /* Main video */
    #video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: contain;
        background: transparent;
        z-index: 1;
    }
</style>
</head>
<body>

<div id="controls">
    <button onclick="listCameras()">Detect Cameras</button><br>
    <select id="cameraList"></select><br>
    <button onclick="startCamera()">Start Camera</button>
</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="bg"></canvas>

<script>
let currentStream = null;
let animId = null;

async function listCameras() {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const select = document.getElementById("cameraList");

    select.innerHTML = "";

    let count = 1;
    devices.forEach(device => {
        if (device.kind === "videoinput") {
            const option = document.createElement("option");
            option.value = device.deviceId;
            option.text = device.label || `Camera ${count++}`;
            select.appendChild(option);
        }
    });

    if (select.options.length === 0) {
        alert("No cameras found.");
    }
}

async function startCamera() {
    const deviceId = document.getElementById("cameraList").value;
    const video = document.getElementById("video");

    if (!deviceId) {
        alert("Select a camera first");
        return;
    }

    try {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }

        video.srcObject = null;

        const stream = await navigator.mediaDevices.getUserMedia({
            video: { deviceId: { exact: deviceId } }
        });

        currentStream = stream;
        video.srcObject = stream;

        document.getElementById("controls").style.display = "none";

        video.onloadeddata = () => {
            startBlur(video);
        };

    } catch (err) {
        alert("Failed to start camera: " + err.message);
    }
}

function startBlur(video) {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");

    function draw() {
        if (video.readyState >= 2) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // 🔥 Apply blur directly in canvas rendering
            ctx.filter = "blur(40px) brightness(0.6)";
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Reset filter for safety
            ctx.filter = "none";
        }

        animId = requestAnimationFrame(draw);
    }

    if (animId) cancelAnimationFrame(animId);
    draw();
}
</script>

</body>
</html>
