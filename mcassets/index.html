<!DOCTYPE html>
<html>
<head>
<title>Minecraft Assets Explorer</title>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f5f6f8;
}

header {
    padding: 12px;
    background: white;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
}

.container { padding: 16px; }

ul { list-style: none; padding: 0; }

li {
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-family: monospace;
}

li:hover { background: #e9eef5; }

.dir { font-weight: 600; }

pre {
    background: #111;
    color: #eee;
    padding: 12px;
    border-radius: 8px;
    overflow: auto;
}

img { max-width: 100%; margin-top: 10px; }

#search {
    padding: 6px;
    border: 1px solid #ccc;
    border-radius: 6px;
}
</style>
</head>

<body>

<header>
    <select id="versionSelect"></select>
    <input id="search" placeholder="Search assets...">
</header>

<div class="container">
    <div id="content">Loading...</div>
</div>

<script>
const manifestUrl = "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json";
const assetRoot = "https://resources.download.minecraft.net/";

let manifest;
let fileMap = {};
let currentPath = "";

const versionCache = new Map();

init();

async function init() {
    manifest = await fetch(manifestUrl).then(r => r.json());

    const select = document.getElementById("versionSelect");

    manifest.versions
        .filter(v => v.type === "release")
        .forEach(v => {
            const opt = document.createElement("option");
            opt.value = v.id;
            opt.textContent = v.id;
            select.appendChild(opt);
        });

    select.onchange = () => loadVersion(select.value);

    loadVersion(select.value || manifest.versions[0].id);
}

async function loadVersion(ver) {
    if (versionCache.has(ver)) {
        fileMap = versionCache.get(ver);
        currentPath = "";
        render();
        return;
    }

    const meta = manifest.versions.find(v => v.id === ver).url;
    const versionData = await fetch(meta).then(r => r.json());

    const assetsJson = await fetch(versionData.assetIndex.url).then(r => r.json());

    fileMap = assetsJson.objects;

    versionCache.set(ver, fileMap);

    currentPath = "";
    render();
}

function navigate(path) {
    currentPath = path;
    render();
}

function render() {
    if (currentPath.startsWith("search:")) {
        renderSearch(currentPath.slice(7));
        return;
    }

    renderDirectory(currentPath);
}

function renderDirectory(dir) {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const children = new Set();

    for (const path in fileMap) {
        if (!path.startsWith(dir)) continue;

        const rest = path.slice(dir.length);
        const part = rest.split("/")[0];
        if (part) children.add(part);
    }

    const ul = document.createElement("ul");

    [...children].sort().forEach(name => {

        const full = dir + name;

        const isDir = Object.keys(fileMap).some(p =>
            p.startsWith(full + "/")
        );

        const li = document.createElement("li");
        li.className = isDir ? "dir" : "file";

        // 🔥 CLEAN FILE EXPLORER STYLE (NO FULL PATH REPETITION)
        li.textContent = name + (isDir ? "/" : "");

        li.onclick = () => {
            if (isDir) navigate(full + "/");
            else openAsset(full);
        };

        ul.appendChild(li);
    });

    content.appendChild(ul);
}

function renderSearch(query) {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const ul = document.createElement("ul");

    query = query.toLowerCase();

    for (const path in fileMap) {
        if (!path.toLowerCase().includes(query)) continue;

        const name = path.split("/").pop();

        const li = document.createElement("li");
        li.textContent = name;

        li.onclick = () => openAsset(path);

        ul.appendChild(li);
    }

    content.appendChild(ul);
}

async function openAsset(path) {
    const content = document.getElementById("content");
    content.innerHTML = "Loading...";

    const entry = fileMap[path];

    if (!entry) {
        content.innerHTML = "Asset missing from index.";
        return;
    }

    const hash = entry.hash.toLowerCase();
    const url = `${assetRoot}${hash.substring(0,2)}/${hash}`;

    try {
        const res = await fetch(url);

        if (!res.ok) {
            content.innerHTML = "Failed to fetch asset.";
            return;
        }

        const buf = await res.arrayBuffer();

        if (path.endsWith(".png")) {
            const img = document.createElement("img");
            img.src = URL.createObjectURL(new Blob([buf]));
            content.innerHTML = "";
            content.appendChild(img);
            return;
        }

        const text = new TextDecoder().decode(buf);
        content.innerHTML = `<pre>${text}</pre>`;

    } catch (e) {
        console.error(e);
        content.innerHTML = "Network/CORS error fetching asset.";
    }
}

document.getElementById("search").oninput = e => {
    const q = e.target.value.trim();
    currentPath = q ? "search:" + q : "";
    render();
};
</script>

</body>
</html>
