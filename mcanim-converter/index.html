<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Animation Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>

body{
font-family:system-ui;
background:#121212;
color:white;
margin:0;
padding:15px;
display:flex;
justify-content:center;
}

.container{
width:900px;
max-width:100%;
background:#1b1b1b;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
margin-top:0;
color:#7cff7c;
font-size:26px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

label{
font-size:14px;
color:#aaa;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #333;
background:#0f0f0f;
color:white;
}

.buttons{
margin-top:15px;
}

button{
padding:10px 16px;
margin:4px;
border:none;
border-radius:6px;
background:#2d7dff;
color:white;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#3c8dff;
}

canvas{
background:black;
margin-top:15px;
border-radius:6px;
max-width:100%;
}

.mode{
margin-top:10px;
color:#7cff7c;
}

.status{
font-size:13px;
color:#aaa;
}

/* MOBILE */

@media (max-width:700px){

.container{
padding:16px;
}

h1{
font-size:22px;
}

.grid{
grid-template-columns:1fr;
}

button{
width:100%;
font-size:16px;
padding:14px;
}

input{
font-size:16px;
padding:12px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Minecraft Animated Texture Converter</h1>

<div class="grid">

<div>
<label>PNG</label>
<input type="file" id="pngFile">
<input type="text" id="pngUrl" placeholder="PNG URL">
</div>

<div>
<label>.mcmeta</label>
<input type="file" id="metaFile">
<input type="text" id="metaUrl" placeholder="mcmeta URL">
</div>

<div>
<label>GIF</label>
<input type="file" id="gifFile">
<input type="text" id="gifUrl" placeholder="GIF URL">
</div>

<div>
<label>Video</label>
<input type="file" id="videoFile">
<input type="text" id="videoUrl" placeholder="Video URL">
</div>

</div>

<div class="buttons">

<button onclick="convertToGif()">Convert → GIF</button>
<button onclick="convertToMinecraft()">Convert → Minecraft Texture</button>

<br>

<button onclick="downloadGif()">Download GIF</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadMCMeta()">Download .mcmeta</button>

</div>

<div class="mode" id="mode">Waiting for input</div>
<div class="status" id="status"></div>

<canvas id="preview"></canvas>

</div>

<script>

const canvas=document.getElementById("preview")
const ctx=canvas.getContext("2d")

let image=null
let frames=[]
let frameSize=0
let frametime=1

let animationId=null
let startTime=0

let gifBlob=null

function setMode(t){
document.getElementById("mode").innerText=t
}

function setStatus(t){
document.getElementById("status").innerText=t
}

function stopAnimation(){
if(animationId!==null){
cancelAnimationFrame(animationId)
animationId=null
}
}

function parseMeta(text){

try{
let j=JSON.parse(text)
frametime=j.animation?.frametime||1
}catch{}

}

function loadImage(src){

stopAnimation()

gifBlob=null

let img=new Image()
img.crossOrigin="anonymous"

img.onload=()=>{

image=img

frameSize=img.width
let count=Math.floor(img.height/frameSize)

frames=[]
for(let i=0;i<count;i++)frames.push(i)

canvas.width=frameSize
canvas.height=frameSize

setMode("Texture Loaded")

startPreview()

}

img.src=src

}

function startPreview(){

startTime=performance.now()

function loop(time){

let fps=20/frametime
let frameDuration=1000/fps

let elapsed=time-startTime
let frameIndex=Math.floor(elapsed/frameDuration)%frames.length

drawFrame(frameIndex)

animationId=requestAnimationFrame(loop)

}

animationId=requestAnimationFrame(loop)

}

function drawFrame(i){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(
image,
0,
frames[i]*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

}

function convertToGif(){

if(!image){
alert("Load a Minecraft texture first")
return
}

setStatus("Generating GIF...")

let fps=20/frametime
let delay=1000/fps

let gif=new GIF({
workers:1,
quality:10,
workerScript:"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js"
})

for(let f of frames){

let c=document.createElement("canvas")
c.width=frameSize
c.height=frameSize
let cctx=c.getContext("2d")

cctx.drawImage(
image,
0,
f*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

gif.addFrame(c,{delay:delay})

}

gif.on("finished",blob=>{
gifBlob=blob
setStatus("GIF ready")
})

gif.render()

}

function convertToMinecraft(){

let gifInput=document.getElementById("gifFile").files[0]
let videoInput=document.getElementById("videoFile").files[0]

if(gifInput){

let img=new Image()

img.onload=()=>{

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

setMode("GIF loaded (export as Minecraft texture)")
}

img.src=URL.createObjectURL(gifInput)

frametime=1
}

if(videoInput){

setMode("Video conversion not implemented yet")

}

}

function downloadGif(){

if(!gifBlob){
alert("Generate the GIF first")
return
}

let a=document.createElement("a")
a.href=URL.createObjectURL(gifBlob)
a.download="animation.gif"
a.click()

}

function downloadPNG(){

let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="texture.png"
a.click()

}

function downloadMCMeta(){

let json={
animation:{
frametime:frametime
}
}

let blob=new Blob([JSON.stringify(json,null,2)],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="texture.png.mcmeta"
a.click()

}

/* INPUT AUTO LOAD */

document.getElementById("pngFile").onchange=e=>{
loadImage(URL.createObjectURL(e.target.files[0]))
}

document.getElementById("pngUrl").onchange=e=>{
loadImage(e.target.value)
}

document.getElementById("metaFile").onchange=e=>{
let r=new FileReader()
r.onload=x=>parseMeta(x.target.result)
r.readAsText(e.target.files[0])
}

document.getElementById("metaUrl").onchange=async e=>{
let res=await fetch(e.target.value)
let txt=await res.text()
parseMeta(txt)
}

</script>

</body>
</html>
