<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Animation Converter</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

<style>

body{
font-family:system-ui;
background:#121212;
color:white;
padding:30px;
display:flex;
justify-content:center;
}

.container{
width:900px;
background:#1b1b1b;
border-radius:10px;
padding:25px;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

h1{
margin-top:0;
color:#7CFF7C;
}

.section{
margin-bottom:25px;
}

.inputs{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

label{
font-size:14px;
color:#bbb;
}

input[type=file],input[type=text]{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #333;
background:#0f0f0f;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#2d7dff;
color:white;
cursor:pointer;
margin-right:8px;
}

button:hover{
background:#3c8dff;
}

.previewBox{
text-align:center;
}

canvas{
background:#000;
margin-top:15px;
border-radius:6px;
}

.mode{
color:#7CFF7C;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Minecraft Animated Texture Converter</h1>

<div class="section inputs">

<div>
<label>PNG Texture</label>
<input type="file" id="pngFile">
<input type="text" id="pngUrl" placeholder="or PNG URL">
</div>

<div>
<label>.mcmeta</label>
<input type="file" id="metaFile">
<input type="text" id="metaUrl" placeholder="or mcmeta URL">
</div>

<div>
<label>GIF</label>
<input type="file" id="gifFile">
<input type="text" id="gifUrl" placeholder="or GIF URL">
</div>

<div>
<label>Video</label>
<input type="file" id="videoFile">
<input type="text" id="videoUrl" placeholder="or Video URL">
</div>

</div>

<div class="section">

<button onclick="convertToGif()">Convert → GIF</button>
<button onclick="convertToMinecraft()">Convert → Minecraft Texture</button>

</div>

<div class="previewBox">

<div class="mode" id="mode">Mode: Waiting for input</div>

<canvas id="preview"></canvas>

</div>

<div class="section">

<button onclick="downloadGif()">Download GIF</button>
<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadMCMeta()">Download .mcmeta</button>

</div>

</div>

<script>

const canvas=document.getElementById("preview")
const ctx=canvas.getContext("2d")

let image=null
let frames=[]
let frameSize=0
let frametime=1
let gifBlob=null

function setMode(text){
document.getElementById("mode").innerText="Mode: "+text
}

function autoDetect(){

if(image && frametime){
setMode("Minecraft → GIF")
}
}

function parseMeta(text){

try{
let json=JSON.parse(text)
frametime=json.animation?.frametime || 1
}catch{}

}

function loadImage(src){

let img=new Image()
img.crossOrigin="anonymous"

img.onload=()=>{

image=img

frameSize=img.width
let count=Math.floor(img.height/frameSize)

frames=[]
for(let i=0;i<count;i++)frames.push(i)

canvas.width=frameSize
canvas.height=frameSize

previewAnimation()

autoDetect()

}

img.src=src

}

function previewAnimation(){

if(!image)return

let fps=20/frametime
let i=0

setInterval(()=>{

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(
image,
0,
frames[i]*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

i=(i+1)%frames.length

},1000/fps)

}

function convertToGif(){

if(!image)return

let fps=20/frametime

let gif=new GIF({workers:2,quality:10})

for(let f of frames){

let c=document.createElement("canvas")
c.width=frameSize
c.height=frameSize
let cctx=c.getContext("2d")

cctx.drawImage(
image,
0,
f*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

gif.addFrame(c,{delay:1000/fps})

}

gif.on("finished",blob=>{
gifBlob=blob
alert("GIF ready to download")
})

gif.render()

setMode("Converted to GIF")

}

function convertToMinecraft(){

let gifInput=document.getElementById("gifFile").files[0]
let videoInput=document.getElementById("videoFile").files[0]

if(gifInput){

let img=new Image()

img.onload=()=>{

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

}

img.src=URL.createObjectURL(gifInput)

frametime=1
setMode("GIF → Minecraft")

}

if(videoInput){

let video=document.createElement("video")
video.src=URL.createObjectURL(videoInput)

video.onloadeddata=()=>{

let fps=20
let duration=video.duration
let frameCount=Math.floor(duration*fps)

frameSize=video.videoWidth

canvas.width=frameSize
canvas.height=frameSize*frameCount

let y=0

function capture(){

if(video.currentTime>=duration)return

ctx.drawImage(video,0,y,frameSize,frameSize)

y+=frameSize
video.currentTime+=1/fps

setTimeout(capture,40)

}

capture()

frametime=1

}

setMode("Video → Minecraft")

}

}

function downloadGif(){

if(!gifBlob)return alert("No GIF yet")

let a=document.createElement("a")
a.href=URL.createObjectURL(gifBlob)
a.download="animation.gif"
a.click()

}

function downloadPNG(){

let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="texture.png"
a.click()

}

function downloadMCMeta(){

let json={
animation:{
frametime:frametime
}
}

let blob=new Blob(
[JSON.stringify(json,null,2)],
{type:"application/json"}
)

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="texture.png.mcmeta"
a.click()

}

document.getElementById("pngFile").onchange=e=>{
loadImage(URL.createObjectURL(e.target.files[0]))
}

document.getElementById("gifFile").onchange=e=>{
loadImage(URL.createObjectURL(e.target.files[0]))
}

document.getElementById("pngUrl").onchange=e=>{
loadImage(e.target.value)
}

document.getElementById("gifUrl").onchange=e=>{
loadImage(e.target.value)
}

document.getElementById("metaFile").onchange=e=>{
let r=new FileReader()
r.onload=x=>parseMeta(x.target.result)
r.readAsText(e.target.files[0])
}

document.getElementById("metaUrl").onchange=async e=>{
let res=await fetch(e.target.value)
let text=await res.text()
parseMeta(text)
}

</script>

</body>
</html>
