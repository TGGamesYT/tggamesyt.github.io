<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Minecraft Animation Converter</title>

<script src="https://cdn.jsdelivr.net/npm/gifshot@0.3.2/build/gifshot.min.js"></script>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:#121212;
font-family:system-ui;
color:white;
}

.container{
width:900px;
max-width:100%;
margin:auto;
background:#1b1b1b;
border-radius:10px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

h1{
margin-top:0;
color:#7cff7c;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:1px solid #333;
background:#0f0f0f;
color:white;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:6px;
background:#2d7dff;
color:white;
cursor:pointer;
}

button:hover{
background:#3c8dff;
}

canvas{
background:black;
margin-top:15px;
border-radius:6px;
max-width:100%;
}

.mode{
margin-top:10px;
color:#7cff7c;
}

/* PHONE MODE */

@media (max-width:700px){

.container{
width:100vw;
height:100vh;
border-radius:0;
padding:15px;
box-sizing:border-box;
display:flex;
flex-direction:column;
overflow:auto;
}

.grid{
grid-template-columns:1fr;
}

button{
width:100%;
padding:14px;
font-size:16px;
}

canvas{
width:100%;
height:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Minecraft Animation Converter</h1>

<div class="grid">

<div>
PNG
<input type="file" id="pngFile">
<input type="text" id="pngUrl" placeholder="PNG URL">
</div>

<div>
.mcmeta
<input type="file" id="metaFile">
<input type="text" id="metaUrl" placeholder="mcmeta URL">
</div>

<div>
GIF
<input type="file" id="gifFile">
</div>

<div>
Video
<input type="file" id="videoFile">
</div>

</div>

<br>

<button onclick="convertToGif()">Convert → GIF</button>
<button onclick="downloadGif()">Download GIF</button>

<br>

<button onclick="downloadPNG()">Download PNG</button>
<button onclick="downloadMCMeta()">Download .mcmeta</button>

<div class="mode" id="mode">Waiting for input</div>

<canvas id="preview"></canvas>

</div>

<script>

const canvas=document.getElementById("preview")
const ctx=canvas.getContext("2d")

let image=null
let frames=[]
let frameSize=0
let frametime=1
let animationId=null
let gifData=null

function parseMeta(text){

try{
let j=JSON.parse(text)
frametime=j.animation?.frametime||1
}catch{}

}

function stopAnimation(){
if(animationId) cancelAnimationFrame(animationId)
}

function loadImage(src){

stopAnimation()

let img=new Image()
img.crossOrigin="anonymous"

img.onload=()=>{

image=img

frameSize=img.width
let count=Math.floor(img.height/frameSize)

frames=[]

for(let i=0;i<count;i++) frames.push(i)

canvas.width=frameSize
canvas.height=frameSize

startPreview()

document.getElementById("mode").innerText="Minecraft texture loaded"

}

img.src=src

}

function startPreview(){

let start=performance.now()

function loop(time){

let fps=20/frametime
let frameTime=1000/fps

let frame=Math.floor((time-start)/frameTime)%frames.length

drawFrame(frame)

animationId=requestAnimationFrame(loop)

}

animationId=requestAnimationFrame(loop)

}

function drawFrame(i){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(
image,
0,
i*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

}

function convertToGif(){

if(!image){
alert("Load a Minecraft animation first")
return
}

let fps=20/frametime

let images=[]

for(let f of frames){

let c=document.createElement("canvas")
c.width=frameSize
c.height=frameSize

let cctx=c.getContext("2d")

cctx.drawImage(
image,
0,
f*frameSize,
frameSize,
frameSize,
0,
0,
frameSize,
frameSize
)

images.push(c.toDataURL())
}

gifshot.createGIF({
images:images,
gifWidth:frameSize,
gifHeight:frameSize,
interval:1/fps
},function(obj){

if(!obj.error){
gifData=obj.image
document.getElementById("mode").innerText="GIF generated"
}

})

}

function downloadGif(){

if(!gifData){
alert("Generate the GIF first")
return
}

let a=document.createElement("a")
a.href=gifData
a.download="animation.gif"
a.click()

}

function downloadPNG(){

let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="texture.png"
a.click()

}

function downloadMCMeta(){

let meta={
animation:{
frametime:frametime
}
}

let blob=new Blob([JSON.stringify(meta,null,2)],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="texture.png.mcmeta"
a.click()

}

document.getElementById("pngFile").onchange=e=>{
loadImage(URL.createObjectURL(e.target.files[0]))
}

document.getElementById("pngUrl").onchange=e=>{
loadImage(e.target.value)
}

document.getElementById("metaFile").onchange=e=>{
let r=new FileReader()
r.onload=x=>parseMeta(x.target.result)
r.readAsText(e.target.files[0])
}

document.getElementById("metaUrl").onchange=async e=>{
let res=await fetch(e.target.value)
let txt=await res.text()
parseMeta(txt)
}

</script>

</body>
</html>
