<!DOCTYPE html>
<html>
<head>
<title>Minecraft Jar Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: #f5f6f8;
}

header {
    padding: 12px 16px;
    background: white;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 10;
}

h2 { margin: 0 0 8px 0; }

.controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

#nav {
    font-size: 14px;
    margin-top: 6px;
    color: #555;
}

#nav a {
    color: #0077cc;
    text-decoration: none;
}

#nav a:hover {
    text-decoration: underline;
}

.container {
    padding: 16px;
}

ul {
    list-style: none;
    padding: 0;
}

li {
    padding: 6px 8px;
    border-radius: 6px;
    cursor: pointer;
}

li:hover {
    background: #e9eef5;
}

.file { color: #333; }
.dir { font-weight: 500; }

pre {
    background: #111;
    color: #eee;
    padding: 12px;
    overflow: auto;
    border-radius: 8px;
}

img {
    max-width: 100%;
    margin-top: 10px;
}

#search {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

#progressBar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: #0077ff;
    transition: width 0.2s ease;
    z-index: 999;
}
</style>
</head>

<body>

<div id="progressBar"></div>

<header>
    <h2>Minecraft Jar Explorer</h2>

    <div class="controls">
        <span>Version:</span>
        <select id="versionSelect"></select>

        <label>
            <input type="checkbox" id="releaseToggle">
            Releases only
        </label>

        <input id="search" placeholder="Search in folder...">
    </div>

    <div id="nav"></div>
</header>

<div class="container">
    <div id="content">Loading...</div>
</div>

<script>
const manifestUrl = "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json";

let zip, manifest;
let currentVersion = null;
let currentPath = "";
let showReleasesOnly = false;
let currentList = [];

const progressBar = document.getElementById("progressBar");

function setLoading(on) {
    if (on) {
        progressBar.style.width = "60%";
    } else {
        progressBar.style.width = "100%";
        setTimeout(() => progressBar.style.width = "0%", 200);
    }
}

init();

async function init() {
    setLoading(true);

    const params = new URLSearchParams(location.search);
    currentVersion = params.get("ver");
    currentPath = normalize(params.get("path") || "");

    manifest = await fetch(manifestUrl).then(r => r.json());

    setupControls();

    if (!currentVersion) {
        document.getElementById("content").innerText = "Select a version";
        setLoading(false);
        return;
    }

    const metaUrl = manifest.versions.find(v => v.id === currentVersion)?.url;
    const meta = await fetch(metaUrl).then(r => r.json());

    const jarData = await fetch(meta.downloads.client.url).then(r => r.arrayBuffer());
    zip = await JSZip.loadAsync(jarData);

    render();
    setLoading(false);
}

function setupControls() {
    const select = document.getElementById("versionSelect");

    function renderOptions() {
        select.innerHTML = "";
        manifest.versions
            .filter(v => !showReleasesOnly || v.type === "release")
            .forEach(v => {
                const opt = document.createElement("option");
                opt.value = v.id;
                opt.textContent = v.id;
                if (v.id === currentVersion) opt.selected = true;
                select.appendChild(opt);
            });
    }

    renderOptions();

    select.onchange = () => location.search = "?ver=" + select.value;

    document.getElementById("releaseToggle").onchange = e => {
        showReleasesOnly = e.target.checked;
        renderOptions();
    };

    document.getElementById("search").oninput = e => {
        renderList(e.target.value.toLowerCase());
    };
}

function normalize(p) {
    return p.replace(/^\/+/, "");
}

function navigate(path) {
    currentPath = normalize(path);

    const params = new URLSearchParams();
    params.set("ver", currentVersion);
    if (currentPath) params.set("path", currentPath);

    history.pushState({}, "", "?" + params.toString());
    render();
}

window.onpopstate = () => {
    const params = new URLSearchParams(location.search);
    currentPath = normalize(params.get("path") || "");
    render();
};

function render() {
    setLoading(true);
    renderNav();

    const file = zip.file(currentPath);

    if (file && !currentPath.endsWith("/")) {
        renderFile(currentPath);
    } else {
        renderDirectory(currentPath);
    }

    setLoading(false);
}

function renderNav() {
    const nav = document.getElementById("nav");
    nav.innerHTML = "";

    let parts = currentPath.split("/").filter(Boolean);
    let current = "";

    const root = document.createElement("a");
    root.textContent = "/";
    root.href = "#";
    root.onclick = e => { e.preventDefault(); navigate(""); };
    nav.appendChild(root);

    parts.forEach(p => {
        nav.appendChild(document.createTextNode(" / "));
        current += p + "/";

        const a = document.createElement("a");
        a.textContent = p;
        a.href = "#";
        a.onclick = e => { e.preventDefault(); navigate(current); };

        nav.appendChild(a);
    });
}

function renderDirectory(dir) {
    const content = document.getElementById("content");

    const children = new Set();

    Object.keys(zip.files).forEach(name => {
        if (!name.startsWith(dir)) return;
        const part = name.slice(dir.length).split("/")[0];
        if (part) children.add(part);
    });

    currentList = [...children].sort();
    renderList("");
}

function renderList(filter) {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const ul = document.createElement("ul");

    currentList
        .filter(c => c.toLowerCase().includes(filter))
        .forEach(child => {

            let full = currentPath + child;
            const isDir = Object.keys(zip.files).some(f => f.startsWith(full + "/"));
            if (isDir) full += "/";

            const li = document.createElement("li");
            li.className = isDir ? "dir" : "file";
            li.textContent = child + (isDir ? "/" : "");

            li.onclick = () => navigate(full);

            ul.appendChild(li);
        });

    content.appendChild(ul);
}

async function renderFile(path) {
    const content = document.getElementById("content");
    content.innerHTML = "";

    const file = zip.file(path);
    const data = await file.async("uint8array");

    if (path.endsWith(".png")) {
        const url = URL.createObjectURL(new Blob([data]));
        const img = document.createElement("img");
        img.src = url;
        content.appendChild(img);
    } else {
        const text = new TextDecoder().decode(data);
        const pre = document.createElement("pre");
        pre.textContent = text;
        content.appendChild(pre);
    }
}
</script>

</body>
</html>
