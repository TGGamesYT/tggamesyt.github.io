<!DOCTYPE html>
<html>
<head>
    <title>Minecraft Jar Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<h2>Minecraft Jar Explorer</h2>

<div id="controls"></div>
<div id="nav"></div>
<hr>
<div id="content">Loading...</div>

<script>
const manifestUrl = "https://piston-meta.mojang.com/mc/game/version_manifest_v2.json";

let zip = null;
let currentVersion = null;
let currentPath = "";
let manifestData = null;
let showReleasesOnly = false;

init();

async function init() {
    const params = new URLSearchParams(location.search);
    currentVersion = params.get("ver");
    currentPath = normalizePath(params.get("path") || "");

    manifestData = await fetch(manifestUrl).then(r => r.json());

    renderControls();

    if (!currentVersion) {
        document.getElementById("content").innerText = "Select a version";
        return;
    }

    const versionMeta = manifestData.versions.find(v => v.id === currentVersion);
    if (!versionMeta) {
        document.getElementById("content").innerText = "Version not found";
        return;
    }

    document.getElementById("content").innerText = "Loading jar...";

    const meta = await fetch(versionMeta.url).then(r => r.json());
    const jarUrl = meta.downloads.client.url;

    const jarData = await fetch(jarUrl).then(r => r.arrayBuffer());
    zip = await JSZip.loadAsync(jarData);

    render();
}

function renderControls() {
    const container = document.getElementById("controls");
    container.innerHTML = "";

    const select = document.createElement("select");

    manifestData.versions
        .filter(v => !showReleasesOnly || v.type === "release")
        .forEach(v => {
            const opt = document.createElement("option");
            opt.value = v.id;
            opt.textContent = v.id;
            if (v.id === currentVersion) opt.selected = true;
            select.appendChild(opt);
        });

    select.onchange = () => {
        location.search = "?ver=" + select.value;
    };

    const toggle = document.createElement("label");
    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = showReleasesOnly;

    checkbox.onchange = () => {
        showReleasesOnly = checkbox.checked;
        renderControls();
    };

    toggle.appendChild(checkbox);
    toggle.appendChild(document.createTextNode(" Releases only"));

    container.appendChild(document.createTextNode("Version: "));
    container.appendChild(select);
    container.appendChild(document.createTextNode(" "));
    container.appendChild(toggle);
}

function normalizePath(p) {
    if (!p) return "";
    p = p.replace(/^\/+/, "");
    return p;
}

function navigate(path) {
    path = normalizePath(path);

    currentPath = path;

    const params = new URLSearchParams();
    params.set("ver", currentVersion);
    if (path) params.set("path", path);

    history.pushState({ path }, "", "?" + params.toString());

    render();
}

window.onpopstate = () => {
    const params = new URLSearchParams(location.search);
    currentPath = normalizePath(params.get("path") || "");
    render();
};

function render() {
    renderNav();

    const file = zip.file(currentPath);

    if (file && !currentPath.endsWith("/")) {
        renderFile(currentPath);
    } else {
        renderDirectory(currentPath);
    }
}

function renderNav() {
    let parts = currentPath.split("/").filter(Boolean);
    let current = "";

    let nav = document.getElementById("nav");
    nav.innerHTML = "";

    const root = document.createElement("a");
    root.href = "#";
    root.textContent = "/";
    root.onclick = e => { e.preventDefault(); navigate(""); };
    nav.appendChild(root);

    parts.forEach(p => {
        nav.appendChild(document.createTextNode(" / "));
        current += p + "/";

        const link = document.createElement("a");
        link.href = "#";
        link.textContent = p;
        link.onclick = e => {
            e.preventDefault();
            navigate(current);
        };

        nav.appendChild(link);
    });
}

function renderDirectory(dir) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    const list = document.createElement("ul");

    if (dir) {
        const up = dir.split("/").slice(0, -2).join("/") + "/";
        const li = document.createElement("li");

        const a = document.createElement("a");
        a.href = "#";
        a.textContent = "⬅ Back";
        a.onclick = e => {
            e.preventDefault();
            navigate(up);
        };

        li.appendChild(a);
        list.appendChild(li);
    }

    const children = new Set();

    Object.keys(zip.files).forEach(name => {
        if (!name.startsWith(dir)) return;

        const rest = name.slice(dir.length);
        const part = rest.split("/")[0];

        if (part) children.add(part);
    });

    [...children].sort().forEach(child => {
        let full = dir + child;

        const isDir = Object.keys(zip.files).some(f => f.startsWith(full + "/"));
        if (isDir) full += "/";

        const li = document.createElement("li");
        const a = document.createElement("a");

        a.href = "#";
        a.textContent = child + (isDir ? "/" : "");
        a.onclick = e => {
            e.preventDefault();
            navigate(full);
        };

        li.appendChild(a);
        list.appendChild(li);
    });

    container.appendChild(list);
}

async function renderFile(path) {
    const container = document.getElementById("content");
    container.innerHTML = "";

    const file = zip.file(path);

    if (!file) {
        container.innerText = "File not found";
        return;
    }

    const content = await file.async("uint8array");

    const back = document.createElement("a");
    back.href = "#";
    back.textContent = "⬅ Back";
    back.onclick = e => {
        e.preventDefault();
        navigate(path.split("/").slice(0, -2).join("/") + "/");
    };

    container.appendChild(back);

    const title = document.createElement("h3");
    title.textContent = path;
    container.appendChild(title);

    if (path.endsWith(".png")) {
        const blob = new Blob([content], { type: "image/png" });
        const url = URL.createObjectURL(blob);

        const img = document.createElement("img");
        img.src = url;
        container.appendChild(img);
    } else {
        const text = new TextDecoder().decode(content);
        const pre = document.createElement("pre");
        pre.textContent = text;
        container.appendChild(pre);
    }
}
</script>

</body>
</html>
